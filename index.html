<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BPM-Matched DJ Mixer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <h1>DJ Mixer</h1>
  <p style="text-align:center; margin-bottom:16px; font-size:0.75rem; letter-spacing:0.08em;">
    <a href="https://aidansak.blogspot.com/2026/05/aidan-sakumas-beatbridgedj-mixer-project.html" target="_blank" rel="noopener" style="color:#88cc00; text-decoration:none;">Project Blog Post ↗</a>
  </p>

  <div class="mixer">

    <!-- Track A -->
    <div class="track-slot" id="slot-a">
      <div class="track-header">
        <div class="track-info">
          <div class="track-title">Track A</div>
        </div>
        <div class="track-load">
          <select id="preset-a">
            <option value="">SELECT PRESET TRACK</option>
            <!-- All 10 files in samples/ (alphabetical by filename) -->
            <option value="samples/Flashing Lights.mp3">Flashing Lights</option>
            <option value="samples/Frank Ocean - Nights 4.mp3">Frank Ocean – Nights</option>
            <option value="samples/Hot 'n Cold- Basement Jaxx.mp3">Basement Jaxx – Hot ’n Cold</option>
            <option value="samples/Icona Pop - I Love It (Feat. Charli XCX)  [Audio] 4.mp3">Icona Pop – I Love It</option>
            <option value="samples/Lauryn Hill - Ex-Factor 4.mp3">Lauryn Hill – Ex-Factor</option>
            <option value="samples/Lose My Mind- Darby.mp3">Darby – Lose My Mind</option>
            <option value="samples/Mitski - Washing Machine Heart.mp3">Mitski – Washing Machine Heart</option>
            <option value="samples/Nice For What 4.mp3">Drake – Nice For What</option>
            <option value="samples/Panic! At The Disco - House of Memories (Official Audio) 4.mp3">Panic! At The Disco – House of Memories</option>
            <option value="samples/Tyler, The Creator - SEE YOU AGAIN (ft. Kali Uchis) 4.mp3">Tyler, The Creator – See You Again</option>
          </select>
          <button id="load-preset-a">Load</button>
          <input type="file" id="upload-a" accept=".mp3,audio/*" />
        </div>
      </div>

      <canvas id="canvas-a" width="1160" height="120"></canvas>

      <div class="track-controls">
        <button id="play-a" disabled>Play</button>
        <button id="stop-a" disabled>Stop</button>
        <label class="bpm-label" title="Auto-detected; edit if wrong — used for beat grid and MIX timing">
          BPM
          <input id="bpm-input-a" class="bpm-input" type="number" inputmode="decimal" min="40" max="240" step="0.1" disabled placeholder="—" />
        </label>
        <span class="status" id="status-a"></span>
        <button class="fx-rack-toggle" data-target="effects-rack-a">FX ▾</button>
      </div>

      <div class="effects-rack collapsed" id="effects-rack-a"></div>
    </div>

    <!-- Mix controls -->
    <div class="mix-controls">
      <label for="fade-beats">Crossfade Beat Length</label>
      <input id="fade-beats" type="range" min="4" max="64" step="1" value="8" />
      <span id="fade-beats-display">8</span>
      <button id="mix-btn" disabled>MIX</button>
      <span class="status-dot" id="mix-dot"></span>
      <span id="mix-status"></span>
    </div>

    <!-- Track B -->
    <div class="track-slot" id="slot-b">
      <div class="track-header">
        <div class="track-info">
          <div class="track-title">Track B</div>
        </div>
        <div class="track-load">
          <select id="preset-b">
            <option value="">SELECT PRESET TRACK</option>
            <!-- All 10 files in samples/ (alphabetical by filename) -->
            <option value="samples/Flashing Lights.mp3">Flashing Lights</option>
            <option value="samples/Frank Ocean - Nights 4.mp3">Frank Ocean – Nights</option>
            <option value="samples/Hot 'n Cold- Basement Jaxx.mp3">Basement Jaxx – Hot ’n Cold</option>
            <option value="samples/Icona Pop - I Love It (Feat. Charli XCX)  [Audio] 4.mp3">Icona Pop – I Love It</option>
            <option value="samples/Lauryn Hill - Ex-Factor 4.mp3">Lauryn Hill – Ex-Factor</option>
            <option value="samples/Lose My Mind- Darby.mp3">Darby – Lose My Mind</option>
            <option value="samples/Mitski - Washing Machine Heart.mp3">Mitski – Washing Machine Heart</option>
            <option value="samples/Nice For What 4.mp3">Drake – Nice For What</option>
            <option value="samples/Panic! At The Disco - House of Memories (Official Audio) 4.mp3">Panic! At The Disco – House of Memories</option>
            <option value="samples/Tyler, The Creator - SEE YOU AGAIN (ft. Kali Uchis) 4.mp3">Tyler, The Creator – See You Again</option>
          </select>
          <button id="load-preset-b">Load</button>
          <input type="file" id="upload-b" accept=".mp3,audio/*" />
        </div>
      </div>

      <canvas id="canvas-b" width="1160" height="120"></canvas>

      <div class="track-controls">
        <button id="play-b" disabled>Play</button>
        <button id="stop-b" disabled>Stop</button>
        <label class="bpm-label" title="Auto-detected; edit if wrong — used for beat grid and MIX timing">
          BPM
          <input id="bpm-input-b" class="bpm-input" type="number" inputmode="decimal" min="40" max="240" step="0.1" disabled placeholder="—" />
        </label>
        <span class="status" id="status-b"></span>
        <button class="fx-rack-toggle" data-target="effects-rack-b">FX ▾</button>
      </div>

      <div class="effects-rack collapsed" id="effects-rack-b"></div>
    </div>

  </div>

  <script>
    // FX rack collapse/expand — plain script, no module needed.
    document.addEventListener('click', e => {
      const btn = e.target.closest('.fx-rack-toggle');
      if (!btn) return;
      const rack = document.getElementById(btn.dataset.target);
      if (!rack) return;
      const collapsed = rack.classList.toggle('collapsed');
      btn.textContent = collapsed ? 'FX ▾' : 'FX ▴';
    });
  </script>
  <script type="module" src="main.js"></script>
</body>
</html>
